<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReActive — Forensic Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  border: none; outline: none; background: transparent; box-shadow: none;
}
:root {
  --bg: #000; --accent: #d4773a; --text: #e8e8e8;
  --dim: #3a3a3a; --mid: #707070; --sep: #444;
  --mono: 'JetBrains Mono', monospace;
}
html, body { width:100%; height:100%; overflow:hidden; background-color:#000; color:var(--text); font-family:var(--mono); }

#sb { position:fixed; top:0; left:0; right:0; height:28px; background-color:#000 !important; border-bottom:1px solid #333 !important; display:flex; align-items:center; padding:0 24px; gap:20px; z-index:100; font-size:9px; letter-spacing:0.1em; color:var(--dim); }
.sl { font-size:10px; font-weight:500; color:var(--text); letter-spacing:0.04em; }
.sl b { color:var(--accent); font-weight:500; }
.sp { color:#333; }
.sd { width:5px; height:5px; border-radius:50%; background-color:#4caf7d !important; display:inline-block; margin-right:4px; }
.ss { flex:1; }
#mv { color:var(--accent); }

#btn { position:fixed; top:44px; z-index:100; display:inline-flex; align-items:center; gap:8px; padding:7px 16px; color:rgba(212,119,58,0.7); font-family:var(--mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; border:1px solid rgba(212,119,58,0.28) !important; cursor:pointer; white-space:nowrap; }
#btn:hover { background-color:rgba(212,119,58,0.08) !important; color:var(--accent); border-color:rgba(212,119,58,0.55) !important; }

#stage { position:fixed; top:28px; left:0; right:0; bottom:0; }

#lw {
  position:absolute; bottom:80px; left:-1vw; width:102vw;
  -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
}
#li { width:100%; height:auto; display:block; mix-blend-mode:lighten; }

/* RAIL — 64px, no border, items use explicit height separators */
#rail {
  position: absolute;
  bottom: 8px; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
}

.it {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 0 20px;
  /* height fills rail so ::before can reference it */
  height: 100%;
  justify-content: center;
}

/*
  Separator: explicit 40px height, centered vertically via
  top:50% + translateY(-50%). This is immune to flex centering issues.
  left: 0 sits at the boundary between items.
  Applied to ALL items so first item gets its left pipe too.
*/
.it::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 48px;
  background-color: var(--sep);
}

/* closing pipe on the right after last item */
.it:last-child::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 48px;
  background-color: var(--sep);
}

/* first pipe: nudge away from page left edge */
.it:first-child { padding-left: 28px; }

.rl { font-size:7px; letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; line-height:1; display:block; margin-bottom:3px; }
.r1, .r2 { font-size:10px; font-weight:400; color:var(--mid); letter-spacing:0.05em; line-height:1.4; white-space:nowrap; display:block; }
</style>
</head>
<body>

<div id="sb">
  <span class="sl">Re<b>Active</b></span>
  <span class="sp">|</span><span style="color:#2e2e2e">Forensic Intelligence</span>
  <span class="sp">|</span><span><span class="sd"></span>SYSTEM ONLINE</span>
  <span class="ss"></span>
  <span>ENGINE V1</span>
  <span class="sp">|</span><span>MODE:&nbsp;<span id="mv">FORENSIC ANALYSIS</span></span>
  <span class="sp">|</span><span id="st">--:--:-- UTC</span>
</div>

<button id="btn">Launch Terminal &nbsp;→</button>

<div id="stage">
  <div id="lw"><img id="li" src="assets/logos/reactive_logo_text.webp" alt="ReActive"></div>

  <div id="rail">
    <div class="it">
      <span class="rl">Target</span>
      <span class="r1">Quorum</span>
      <span class="r2">Northgate</span>
    </div>
    <div class="it">
      <span class="rl">Format</span>
      <span class="r1">Self-guided</span>
      <span class="r2">Forensic walkthrough</span>
    </div>
    <div class="it">
      <span class="rl">Runtime</span>
      <span class="r1">~4</span>
      <span class="r2">Minutes</span>
    </div>
    <div class="it">
      <span class="rl">Engine</span>
      <span class="r1">Deterministic</span>
      <span class="r2">V1</span>
    </div>
    <div class="it">
      <span class="rl">Positioning</span>
      <span class="r1">Structural coherence engine</span>
      <span class="r2">for institutional real estate.</span>
    </div>
    <div class="it">
      <span class="rl">Build</span>
      <span class="r1">2026</span>
      <span class="r2">ReActive</span>
    </div>
  </div>
</div>

<script>
  function tick() { document.getElementById('st').textContent = new Date().toUTCString().split(' ')[4] + ' UTC'; }
  setInterval(tick, 1000); tick();
  function align() { const r = document.getElementById('mv').getBoundingClientRect(); document.getElementById('btn').style.right = (window.innerWidth - r.right) + 'px'; }
  window.addEventListener('load', align);
  window.addEventListener('resize', align);
</script>
</body>
</html>
