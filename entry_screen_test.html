<!DOCTYPE html>
<!-- ReActive page 1 (entry). The persistent rail, admin links and ENGINE V1 light now live in
     the wrapper; this page only paints its own content inside the inset frame.
     Self-contained: no external fonts or scripts, same-origin assets only. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReActive — Forensic Intelligence</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#000; --panel:#0a0a0a; --border:#262626;
  --accent:#d4773a; --accent-br:#fb923c; --cyan:#5bbccf; --green:#5e9e6f;
  --wm:#a8a8a8; --text:#cfcfcf; --meta:#6a6a6a; --dim:#3a3a3a; --mid:#707070; --sep:#444;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--mono); }

#sb { position:fixed; top:0; left:0; right:0; height:28px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 18px; gap:14px; z-index:100; font-size:10px; letter-spacing:.04em; color:var(--meta); }
#sb .sl { font-size:11px; color:var(--wm); letter-spacing:.02em; }
#sb .sl b { color:var(--accent); font-weight:500; }
#sb .sp { color:#2c2c2c; }
#sb .ok { color:var(--green); }
#sb .hi { color:var(--accent); }
#sb .ss { flex:1; }

#stage { position:fixed; top:28px; left:0; right:0; bottom:0; }

#btn { position:absolute; left:50%; transform:translateX(-50%); top:80px; z-index:60; display:inline-flex; align-items:center; gap:9px; padding:9px 22px; color:var(--accent-br); font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; border:1px solid var(--accent); background:transparent; cursor:pointer; white-space:nowrap; transition:background .15s; }
#btn:hover { background:rgba(212,119,58,.1); }

#lw { position:absolute; bottom:80px; left:0; right:0; width:100%; -webkit-mask-image:linear-gradient(to bottom,#000 65%,transparent 100%); mask-image:linear-gradient(to bottom,#000 65%,transparent 100%); }
#li { width:100%; height:auto; display:block; }

#rail { position:absolute; bottom:8px; left:0; right:0; height:64px; display:flex; align-items:center; }
.it { flex:1; position:relative; display:flex; flex-direction:column; gap:3px; padding:0 20px; height:100%; justify-content:center; }
.it::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:1px; height:48px; background:var(--sep); }
.it:last-child::after { content:''; position:absolute; right:0; top:50%; transform:translateY(-50%); width:1px; height:48px; background:var(--sep); }
.it:first-child::before { display:none; }
.it:first-child { padding-left:24px; }
.rl { font-size:7px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; line-height:1; display:block; margin-bottom:3px; }
.r1, .r2 { font-size:10px; color:var(--mid); letter-spacing:.05em; line-height:1.4; white-space:nowrap; display:block; }
</style>
</head>
<body>

<div id="sb">
  <span class="sl">Re<b>Active</b></span>
  <span class="sp">|</span><span>System:&nbsp;<span class="ok">Online</span></span>
  <span class="sp">|</span><span>Coverage:&nbsp;PE&nbsp;Real&nbsp;Estate</span>
  <span class="sp">|</span><span>Mode:&nbsp;Forensic&nbsp;Analysis</span>
  <span class="sp">|</span><span>Pipeline:&nbsp;<span class="hi">Deterministic</span></span>
  <span class="ss"></span>
</div>

<div id="stage">
  <button id="btn">Enter <span aria-hidden="true">&#8594;</span></button>

  <div id="lw"><img id="li" src="assets/logos/reactive_logo_text.webp" alt="ReActive"></div>

  <div id="rail">
    <div class="it"><span class="rl">Target</span><span class="r1">Quorum &middot; NorthGate</span><span class="r2">Atlas &middot; Hotel</span></div>
    <div class="it"><span class="rl">Format</span><span class="r1">Self-guided</span><span class="r2">Forensic walkthrough</span></div>
    <div class="it"><span class="rl">Runtime</span><span class="r1">~4</span><span class="r2">Minutes</span></div>
    <div class="it"><span class="rl">Engine</span><span class="r1">Deterministic</span><span class="r2">V1</span></div>
    <div class="it"><span class="rl">Positioning</span><span class="r1">Forensic Intelligence</span><span class="r2">for Institutional Real Estate</span></div>
    <div class="it"><span class="rl">Build</span><span class="r1">2026</span><span class="r2">ReActive</span></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var inFrame = (window.parent && window.parent !== window);

  // Enter: centered, mid-distance between the top bar and the logo
  function centerEnter(){
    var stage = document.getElementById("stage"), lw = document.getElementById("lw"), btn = document.getElementById("btn");
    if (!stage || !lw || !btn) return;
    var stageTop = stage.getBoundingClientRect().top;
    var logoTop = lw.getBoundingClientRect().top;
    var mid = (stageTop + logoTop) / 2;
    var t = mid - stageTop - (btn.offsetHeight / 2);
    btn.style.top = Math.max(10, t) + "px";
  }
  var img = document.getElementById("li");
  if (img.complete) centerEnter(); else img.addEventListener("load", centerEnter);
  window.addEventListener("load", centerEnter);
  window.addEventListener("resize", centerEnter);

  document.getElementById("btn").addEventListener("click", function(){
    if (inFrame && typeof window.parent.__reactiveGo === "function") window.parent.__reactiveGo(1);
    else window.location.href = "page_2.html";
  });
})();
</script>
</body>
</html>
