<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

        :root { --bg-core: #f5f5f5; --bg-panel: #ffffff; --border: #e0e0e0; --accent: #d4773a; --text-muted: #888888; }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 3px; }
        
        /* ANIMATIONS */
        .target-pulse { animation: pulse 2.5s infinite; }
        @keyframes pulse { 
            0% { background-color: rgba(212, 119, 58, 0.04); } 
            50% { background-color: rgba(212, 119, 58, 0.10); } 
            100% { background-color: rgba(212, 119, 58, 0.04); } 
        }
        
        .badge-pulse { animation: badge 2s infinite; }
        @keyframes badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .live-dot { animation: live 1.5s infinite; }
        @keyframes live { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* UTILITY */
        .cursor-not-allowed { cursor: not-allowed !important; }
    </style>
</head>

                                                <span className={`${item.ticker === 'URW.AS' ? 'text-[#d4773a]' : 'text-[#888888]'} font-bold`}>{item.ticker}</span>

                                        </div>
                                    ))}

                            </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Terminal />);

</body>
