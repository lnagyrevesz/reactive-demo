<!DOCTYPE html>
<!-- ReActive demo sequence wrapper. Drop at repo root; the Vercel root URL runs pages 1-4 in order.
     The ONLY thing to adjust if your layout differs: the four src paths in the PAGES array below.
     This supersedes the old Replit-era index.html. If you want to keep that, rename this file
     (e.g. demo.html) and point Vercel at it instead. Self-contained, no network dependency. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReActive — Demo</title>
<style>
  :root {
    --bg:#050505; --panel:#0a0a0a; --border:#262626; --border2:#1a1a1a;
    --txt-mute:#9a9a9a; --txt-meta:#7a7a7a; --txt-dim:#565656;
    --accent-br:#fb923c; --cyan:#5bbccf;
    --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); overflow:hidden; }
  #frame { position:fixed; inset:0; width:100vw; height:100vh; border:0; background:var(--bg); }

  #nav {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; align-items:center; gap:4px; padding:6px 8px;
    background:rgba(8,8,8,.86); border:1px solid var(--border); border-radius:24px;
    font-family:var(--mono); backdrop-filter:blur(6px);
  }
  #nav .arrow {
    width:28px; height:28px; border-radius:50%; border:1px solid var(--border2);
    background:none; color:var(--txt-meta); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center; transition:border-color .2s, color .2s;
  }
  #nav .arrow:hover { border-color:var(--txt-dim); color:#e8e8e8; }
  #nav .dots { display:flex; gap:3px; padding:0 4px; }
  #nav .dot {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:4px 10px; border-radius:14px; cursor:pointer; transition:background .2s;
  }
  #nav .dot:hover { background:rgba(255,255,255,.04); }
  #nav .dot .n { font-size:10px; letter-spacing:.5px; color:var(--txt-dim); transition:color .2s; }
  #nav .dot .l { font-size:8px; letter-spacing:.3px; color:transparent; height:0; overflow:hidden; transition:color .2s; white-space:nowrap; }
  #nav .dot.active .n { color:var(--cyan); }
  #nav .dot.active .l { color:var(--txt-meta); height:auto; }
  #nav .brand { font-size:9px; letter-spacing:.5px; color:var(--txt-dim); padding-left:6px; padding-right:2px; }
  #nav .brand b { color:var(--accent-br); font-weight:600; }
</style>
</head>
<body>
  <iframe id="frame" title="ReActive demo page"></iframe>

  <div id="nav">
    <span class="brand"><b>Re</b>Active</span>
    <button class="arrow" id="prev" aria-label="Previous page">&#8592;</button>
    <div class="dots" id="dots"></div>
    <button class="arrow" id="next" aria-label="Next page">&#8594;</button>
  </div>

<script>
(function(){
  "use strict";
  // --- adjust these four paths only if your repo layout differs from flat root ---
  var PAGES = [
    { src:"entry_screen_test.html", n:"01", label:"Enter" },
    { src:"page_2.html",            n:"02", label:"Before / After" },
    { src:"page_3.html",            n:"03", label:"The Pipeline" },
    { src:"page_4.html",            n:"04", label:"Execution" }
  ];

  var frame = document.getElementById("frame");
  var dotsWrap = document.getElementById("dots");
  var idx = 0;

  PAGES.forEach(function(p, i){
    var d = document.createElement("div");
    d.className = "dot";
    d.innerHTML = '<span class="n">' + p.n + '</span><span class="l">' + p.label + '</span>';
    d.addEventListener("click", function(){ go(i); });
    dotsWrap.appendChild(d);
  });
  var dotEls = dotsWrap.querySelectorAll(".dot");

  function go(i){
    idx = Math.max(0, Math.min(PAGES.length - 1, i));
    frame.src = PAGES[idx].src;
    dotEls.forEach(function(el, j){ el.classList.toggle("active", j === idx); });
    document.getElementById("nav").style.display = (idx === 0 ? "none" : "flex");
    if (history.replaceState) history.replaceState(null, "", "#" + PAGES[idx].n);
  }
  window.__reactiveGo = go;

  document.getElementById("prev").addEventListener("click", function(){ go(idx - 1); });
  document.getElementById("next").addEventListener("click", function(){ go(idx + 1); });
  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight") go(idx + 1);
    else if (e.key === "ArrowLeft") go(idx - 1);
  });

  // honor a #NN hash on load so a link can deep-link to a page
  var start = 0;
  var h = (location.hash || "").replace("#", "");
  PAGES.forEach(function(p, i){ if (p.n === h) start = i; });
  go(start);
})();
</script>
</body>
</html>
