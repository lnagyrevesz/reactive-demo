<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ReActive — Page 2</title>
<style>
  /* =======================================================================
     ASSET + SURFACE PATHS  (root-relative, lowercase; Vercel case-sensitive)
        assets/scene/dataroom.png   (Smart_Dataroom plate, 16:9)
        assets/scene/desk.png       (dual-monitor desk plate, 16:9)
        coverage_terminal.html  -> LEFT screen  (coverage / structure)
        page2_findings.html     -> RIGHT screen (illustrative single finding card; NOT the real northgate_findings.html, which is reserved for the later chapter)
     ======================================================================= */
  :root {
    --dataroom: url("assets/scene/dataroom.png");
    --desk:     url("assets/scene/desk.png");

    --bg:#000; --ink:#e9ebec; --ink-2:#b9bdc0; --ink-3:#8a8f93; --ink-4:#5f6469;
    --accent:#d4773a; --accent-br:#fb923c; --line:#2a2e32;
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--ink); font-family:var(--mono); }

  .scene { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
  .frame { position:relative; width:min(100vw, calc(100vh * 1.7768)); height:min(100vh, calc(100vw / 1.7768)); overflow:hidden; background:#08090a; }

  /* layers */
  .layer { position:absolute; inset:0; transition:opacity .9s ease; }
  .L-room { opacity:1; }
  .L-desk { opacity:0; pointer-events:none; }
  .frame.p2 .L-room { opacity:0; pointer-events:none; }
  .frame.p2 .L-desk { opacity:1; pointer-events:auto; }

  .plate { position:absolute; inset:0; background-size:cover; background-position:center; background-color:#0a0b0c; }
  .plate.dataroom { background-image:var(--dataroom); transform:scale(1); transform-origin:50% 70%; transition:transform 6s cubic-bezier(.22,.61,.36,1); }
  .plate.desk { background-image:var(--desk); }
  .frame.p1 .plate.dataroom, .frame.p2 .plate.dataroom { transform:scale(1.55); }

  .scrim-bl  { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.72) 0%, rgba(0,0,0,.28) 26%, transparent 52%); }
  .scrim-top { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,.66) 0%, rgba(0,0,0,.08) 26%, transparent 42%); }

  /* arc lines (the only narrative copy) */
  .line { position:absolute; font-family:var(--mono); font-weight:400; line-height:1.3; letter-spacing:.01em; color:var(--ink); font-size:clamp(16px, 2.05vw, 30px); max-width:62%; }
  .line1 { left:7%; bottom:13%; opacity:0; transition:opacity 1.1s ease; }
  .line2 { left:7%; top:9%;    opacity:0; transition:opacity 1.1s ease .35s; }
  .frame.p1 .line1 { opacity:1; }
  .frame.p2 .line2 { opacity:1; }

  /* composited screens (desk) */
  .screen { position:absolute; overflow:hidden; cursor:pointer; background:#0c0d0e; }
  .screen iframe { position:absolute; top:0; left:0; border:0; transform-origin:top left; pointer-events:none; background:#0a0b0c; }
  .screen .hit  { position:absolute; inset:0; z-index:3; }
  .screen .glow { position:absolute; inset:0; z-index:2; box-shadow:inset 0 0 0 1px rgba(255,255,255,.04); transition:box-shadow .25s ease, background .25s ease; }
  .screen:hover .glow { box-shadow:inset 0 0 0 1px rgba(251,146,60,.5); background:rgba(251,146,60,.05); }
  .screen .open { position:absolute; right:8px; top:8px; z-index:4; font-family:var(--mono); font-size:clamp(8px,.7vw,11px); letter-spacing:.12em; text-transform:uppercase; color:var(--accent-br); opacity:0; transform:translateY(-3px); transition:opacity .25s ease, transform .25s ease; }
  .screen:hover .open { opacity:1; transform:translateY(0); }
  .screen.left  { left:20.45%; top:32.41%; width:29.31%; height:31.67%; }
  .screen.right { left:50.54%; top:32.52%; width:29.54%; height:31.56%; }

  .cap { position:absolute; z-index:4; font-family:var(--mono); font-size:clamp(8px,.72vw,11px); letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); white-space:nowrap; }
  .cap b { color:var(--ink-2); font-weight:500; }
  .cap.left  { left:20.45%; top:65.5%; }
  .cap.right { left:50.54%; top:65.5%; }

  .prompt { position:absolute; left:0; right:0; bottom:6%; text-align:center; z-index:4; font-family:var(--mono); font-size:clamp(9px,.85vw,12px); letter-spacing:.2em; text-transform:uppercase; color:var(--ink-4); }
  .prompt .k { color:var(--accent); }

  /* brand mark (room phases only) */
  .brandmark { position:absolute; left:7%; top:9%; z-index:6; font-family:var(--sans); font-weight:700; font-size:clamp(13px,1.2vw,17px); letter-spacing:.02em; color:var(--ink); }
  .brandmark .s { color:var(--accent-br); }
  .frame.p2 .brandmark { display:none; }

  /* skip hint (room phases) + replay (desk) */
  .skip { position:absolute; right:5.5%; bottom:8%; z-index:6; font-family:var(--mono); font-size:clamp(9px,.8vw,12px); letter-spacing:.16em; text-transform:uppercase; color:var(--ink-4); opacity:.7; }
  .frame.p2 .skip { display:none; }
  .skiplayer { position:absolute; inset:0; z-index:5; cursor:pointer; }
  .frame.p2 .skiplayer { display:none; }
  .replay { position:absolute; right:5.5%; bottom:8%; z-index:6; display:none; font-family:var(--mono); font-size:clamp(9px,.8vw,12px); letter-spacing:.16em; text-transform:uppercase; color:var(--ink-4); border:1px solid var(--line); background:rgba(0,0,0,.3); padding:7px 13px; cursor:pointer; }
  .replay:hover { color:var(--accent-br); border-color:rgba(251,146,60,.5); }
  .frame.p2 .replay { display:inline-block; }

  /* fullscreen expand */
  .expand { position:fixed; inset:0; z-index:50; background:#050505; display:none; flex-direction:column; opacity:0; transform:scale(.985); transition:opacity .26s ease, transform .26s ease; }
  .expand.on { display:flex; opacity:1; transform:scale(1); }
  .exp-bar { flex:0 0 38px; display:flex; align-items:center; gap:14px; padding:0 16px; background:#0a0b0c; border-bottom:1px solid var(--line); }
  .exp-bar .lbl { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-2); }
  .exp-bar .lbl .k { color:var(--accent-br); }
  .exp-bar .right { margin-left:auto; display:flex; align-items:center; gap:14px; }
  .exp-bar .esc { font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--ink-4); }
  .exp-close { font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); border:1px solid var(--line); background:transparent; padding:5px 11px; cursor:pointer; }
  .exp-close:hover { color:var(--accent-br); border-color:rgba(251,146,60,.5); }
  .expand iframe { flex:1 1 auto; width:100%; border:0; background:#050505; }

  @media (prefers-reduced-motion: reduce) {
    .plate.dataroom { transition:transform .3s ease; }
    .layer { transition:opacity .25s linear; }
    .expand { transition:opacity .15s linear; transform:none; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="frame p0" id="frame">

    <!-- ============ ROOM (silent open -> line 1) ============ -->
    <div class="layer L-room">
      <div class="plate dataroom"></div>
      <div class="scrim-bl"></div>
      <div class="line line1">Analyzing a property fund portfolio used to look like this.</div>
    </div>

    <!-- ============ DESK (line 2 + live surfaces) ============ -->
    <div class="layer L-desk">
      <div class="plate desk"></div>
      <div class="scrim-top"></div>
      <div class="line line2">It looks like this now.</div>

      <div class="screen left" id="scLeft" role="button" tabindex="0" aria-label="Open coverage surface">
        <iframe id="ifLeft" title="Coverage" scrolling="no" loading="lazy"></iframe>
        <div class="glow"></div><div class="open">View &rarr;</div><div class="hit"></div>
      </div>
      <div class="cap left"><b>Coverage</b> · Private funds</div>

      <div class="screen right" id="scRight" role="button" tabindex="0" aria-label="Open findings surface">
        <iframe id="ifRight" title="Findings" scrolling="no" loading="lazy"></iframe>
        <div class="glow"></div><div class="open">View &rarr;</div><div class="hit"></div>
      </div>
      <div class="cap right"><b>Scan</b> · Coherence testing</div>

      <div class="prompt">Select a screen to open it <span class="k">·</span> or press 1 / 2</div>
    </div>

    <!-- chrome -->
    <div class="brandmark">Re<span class="s">/</span>Active</div>
    <div class="skip">Skip &rarr;</div>
    <div class="skiplayer" id="skiplayer"></div>
    <button class="replay" id="replay">&#8635; Replay</button>

  </div>
</div>

<div class="expand" id="expand" role="dialog" aria-modal="true">
  <div class="exp-bar">
    <span class="lbl" id="expLbl"><span class="k">&#9679;</span> Coverage</span>
    <div class="right"><span class="esc">Esc to close</span><button class="exp-close" id="expClose">Close &#10005;</button></div>
  </div>
  <iframe id="expFrame" title="Surface" src="about:blank"></iframe>
</div>

<script>
(function(){
  var LEFT_SRC="coverage_terminal.html", RIGHT_SRC="page2_findings.html", LOGICAL_W=1440;
  var HOLD = [3500, 5500]; // phase 0 hold, phase 1 hold (ms) before auto-advancing

  var frame=document.getElementById("frame");
  var phase=0, loaded=false, timer=null;

  function applyPhase(){
    frame.className="frame p"+phase;
    if(phase===2){
      if(!loaded){ document.getElementById("ifLeft").src=LEFT_SRC; document.getElementById("ifRight").src=RIGHT_SRC; loaded=true; }
      requestAnimationFrame(function(){ requestAnimationFrame(fitAll); });
    }
  }
  function schedule(){
    clearTimeout(timer);
    if(phase===0) timer=setTimeout(function(){ go(1); }, HOLD[0]);
    else if(phase===1) timer=setTimeout(function(){ go(2); }, HOLD[1]);
  }
  function go(n){ phase=Math.max(0,Math.min(2,n)); applyPhase(); schedule(); }
  function advance(){ if(phase<2) go(phase+1); }

  function fit(wrapId, ifId){
    var wrap=document.getElementById(wrapId), ifr=document.getElementById(ifId);
    var w=wrap.clientWidth, h=wrap.clientHeight; if(!w||!h) return;
    ifr.style.width=LOGICAL_W+"px"; ifr.style.height=Math.round(LOGICAL_W*h/w)+"px"; ifr.style.transform="scale("+(w/LOGICAL_W)+")";
  }
  function fitAll(){ fit("scLeft","ifLeft"); fit("scRight","ifRight"); }

  /* expand */
  var expand=document.getElementById("expand"), expFrame=document.getElementById("expFrame"), expLbl=document.getElementById("expLbl");
  function openExpand(which){
    var src=which==="left"?LEFT_SRC:RIGHT_SRC;
    var name=which==="left"?"Coverage · Private funds":"Scan · Coherence testing";
    expLbl.innerHTML='<span class="k">&#9679;</span> '+name; expFrame.src=src; expand.classList.add("on");
  }
  function closeExpand(){ expand.classList.remove("on"); setTimeout(function(){ if(!expand.classList.contains("on")) expFrame.src="about:blank"; },300); }

  document.getElementById("skiplayer").addEventListener("click", advance);
  document.getElementById("replay").addEventListener("click", function(){ go(0); });
  document.getElementById("scLeft").addEventListener("click", function(){ openExpand("left"); });
  document.getElementById("scRight").addEventListener("click", function(){ openExpand("right"); });
  document.getElementById("scLeft").addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openExpand("left"); } });
  document.getElementById("scRight").addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openExpand("right"); } });
  document.getElementById("expClose").addEventListener("click", closeExpand);

  document.addEventListener("keydown", function(e){
    if(expand.classList.contains("on")){ if(e.key==="Escape") closeExpand(); return; }
    if(e.key==="ArrowRight"||e.key==="Enter"||e.key===" ") advance();
    else if(phase===2 && e.key==="1") openExpand("left");
    else if(phase===2 && e.key==="2") openExpand("right");
  });
  window.addEventListener("resize", function(){ if(phase===2) fitAll(); });

  applyPhase(); schedule();
})();
</script>
</body>
</html>
